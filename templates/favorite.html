<html>
<head>
    <title>Favorite Buku</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">

    <h1 class="mb-4">
        ❤️ Buku Favorite
    </h1>

    <a href="/user" class="btn btn-primary mb-4">
        Kembali
    </a>

    <div class="row">

        {% for b in favorit %}

        <div class="col-md-4 mb-4">

            <div class="card bg-secondary text-light h-100">

                <img
                    src="{{ url_for('static', filename='uploads/' + b[3]) }}"
                    class="card-img-top"
                    style="height:250px; object-fit:cover;"
                >

                <div class="card-body">

                    <h4>{{ b[1] }}</h4>

                    <p>Penulis : {{ b[2] }}</p>

                    <a
                        href="{{ url_for('static', filename='pdf/' + b[4]) }}"
                        target="_blank"
                        class="btn btn-primary"
                    >
                        Baca
                    </a>
                    <a
    href="/hapus-favorite/{{ b[0] }}"
    class="btn btn-danger"
>
    Hapus
</a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
