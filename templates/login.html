<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h1>Login Admin</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}

                <div class="alert alert-danger">
                    {{ msg }}
                </div>

            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="mb-3">

            <label>Username</label>

            <input type="text"
                   name="username"
                   class="form-control">

        </div>

        <div class="mb-3">

            <label>Password</label>

            <input type="password"
                   name="password"
                   class="form-control">

        </div>

        <button class="btn btn-primary">
            Login
        </button>

    </form>

</div>

</body>
</html>
