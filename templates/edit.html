<html>
<head>

    <title>Edit Buku</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h1>Edit Buku</h1>

    <form method="POST">

        <div class="mb-3">
            <label>Nama Buku</label>

            <input
            type="text"
            name="nama"
            class="form-control"
            value="{{ buku[1] }}">
        </div>

        <div class="mb-3">
            <label>Penulis</label>

            <input
            type="text"
            name="penulis"
            class="form-control"
            value="{{ buku[2] }}">
        </div>

        <button class="btn btn-primary">
            Update Buku
        </button>

    </form>

</div>

</body>
</html>
