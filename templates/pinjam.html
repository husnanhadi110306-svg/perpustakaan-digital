<html>
<head>
    <title>Pinjam Buku</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">

        <h2>📚 Buku Dipinjam</h2>

        <a href="/user" class="btn btn-warning">
            Kembali
        </a>

    </div>

    <div class="row">

       {% for b in pinjam_buku %}

<div class="col-md-4 mb-4">

    <div class="card bg-secondary text-light">

        <img
            src="https://ougnllblbwrzewqgskle.supabase.co/storage/v1/object/public/books/gambar/{{ b.gambar }}"
            class="card-img-top"
            style="height:250px; object-fit:cover;"
        >

        <div class="card-body">

            <h4>{{ b.nama }}</h4>

            <p>Penulis : {{ b.penulis }}</p>

            <a
                href="https://ougnllblbwrzewqgskle.supabase.co/storage/v1/object/public/books/pdf/{{ b.pdf }}"
                target="_blank"
                class="btn btn-primary"
            >
                Baca
            </a>

        </div>

    </div>

</div>

{% endfor %}

    </div>

</div>

</body>
</html>
